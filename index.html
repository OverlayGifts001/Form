<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: Arial, sans-serif; padding: 20px; }
      input, button { margin: 10px 0; padding: 8px; width: 100%; max-width: 300px; }
      #status { margin-top: 15px; font-weight: bold; }
    </style>
  </head>
  <body>
    <h3>Product Video Upload</h3>
    <input type="text" id="productId" placeholder="Enter Product ID (e.g. RING001)" required><br>
    <input type="file" id="videoFile" accept="video/*" required><br>
    <button id="uploadBtn" onclick="processUpload()">Upload to Drive</button>
    <div id="status"></div>

    <script>
      function processUpload() {
        const fileInput = document.getElementById('video_file'); // Fixed ID mismatch
        const productId = document.getElementById('productId').value;
        const status = document.getElementById('status');
        const btn = document.getElementById('uploadBtn');

        if (!productId || !document.getElementById('videoFile').files[0]) {
          alert("Please enter a Product ID and select a video.");
          return;
        }

        status.innerHTML = "Processing... please wait.";
        btn.disabled = true;

        const reader = new FileReader();
        reader.onload = function(e) {
          const data = {
            productId: productId,
            videoFile: e.target.result
          };
          
          google.script.run
            .withSuccessHandler(function(msg) {
              status.innerHTML = msg;
              btn.disabled = false;
            })
            .withFailureHandler(function(err) {
              status.innerHTML = "Error: " + err;
              btn.disabled = false;
            })
            .uploadVideo(data);
        };
        reader.readAsDataURL(document.getElementById('videoFile').files[0]);
      }
    </script>
  </body>
</html>
