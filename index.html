<div style="max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
    <h3>Jewels-AI Upload</h3>
    
    <label>Customer/Folder Name:</label><br>
    <input type="text" id="folderName" placeholder="Enter Folder Name" required style="width: 100%; margin-bottom: 10px;"><br>
    
    <label>Select Video:</label><br>
    <input type="file" id="videoFile" accept="video/*" required style="width: 100%; margin-bottom: 20px;"><br>
    
    <button onclick="uploadFile()" id="submitBtn" style="width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer;">Upload Now</button>
    
    <p id="status" style="margin-top: 15px; font-weight: bold;"></p>
</div>

<script>
function uploadFile() {
    const folderInput = document.getElementById('folderName').value;
    const fileInput = document.getElementById('videoFile');
    const status = document.getElementById('status');
    const btn = document.getElementById('submitBtn');

    if (!folderInput || fileInput.files.length === 0) {
        alert("Please enter a folder name and select a file!");
        return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();

    btn.disabled = true;
    status.innerText = "Preparing upload...";

    reader.onload = function(e) {
        const payload = {
            filename: file.name,
            folderName: folderInput,
            fileContent: e.target.result
        };

        status.innerText = "Uploading to folder: " + folderInput + "...";

        fetch('YOUR_WEB_APP_URL_HERE', {
            method: 'POST',
            mode: 'no-cors', 
            body: new URLSearchParams(payload)
        })
        .then(() => {
            status.innerText = "Success! Folder '" + folderInput + "' updated.";
            btn.disabled = false;
        })
        .catch(err => {
            status.innerText = "Error: " + err;
            btn.disabled = false;
        });
    };
    reader.readAsDataURL(file);
}
</script>
