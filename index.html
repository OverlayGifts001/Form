<!DOCTYPE html>
<html>
  <body>
    <h3>Product Video Upload</h3>
    <input type="text" id="productId" placeholder="Enter Product ID" required><br><br>
    <input type="file" id="videoFile" accept="video/*" required><br><br>
    <button onclick="processUpload()">Upload</button>
    <div id="status"></div>

    <script>
      function processUpload() {
        const fileInput = document.getElementById('videoFile');
        const productId = document.getElementById('productId').value;
        const status = document.getElementById('status');

        if (!productId || fileInput.files.length === 0) return alert("Fill all fields");

        status.innerHTML = "Uploading...";
        const reader = new FileReader();
        reader.onload = function(e) {
          google.script.run
            .withSuccessHandler(msg => status.innerHTML = msg)
            .uploadVideo({ productId: productId, videoFile: e.target.result });
        };
        reader.readAsDataURL(fileInput.files[0]);
      }
    </script>
  </body>
</html>
